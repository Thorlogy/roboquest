<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RoboQuest 3D - Forest Expedition</title>
    <meta name="description" content="Steuere den Eco-Bot durch den Wald und löse Programmier-Quests!">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=11">
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Google Blockly CDN -->
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
</head>
<body>
    <div id="app-container">
        <!-- Sidebar Menu -->
        <aside class="sidebar">
            <button class="nav-btn active"><span>❱</span></button>
            <button class="nav-btn" style="background:#f39c12;"><span>↪</span></button>
            <button class="nav-btn" style="background:#8bc34a;"><span>◎</span></button>
            <button class="nav-btn" style="background:#e67e22;"><span>⑂</span></button>
            <button class="nav-btn" id="btn-ide" style="background:#2980b9;" title="Programmieren"><span>⚏</span></button>
        </aside>

        <!-- Main 3D Viewport -->
        <main class="viewport">
            <!-- Container for WebGL -->
            <div id="canvas-container"></div>

            <!-- HUD: Score + Quest -->
            <div class="hud-panel" id="hud-panel" style="pointer-events: auto;">
                <div class="hud-score">⭐ <span id="score-display">0</span> Punkte</div>
                <div class="hud-quest" id="quest-display">
                    <span class="level-badge" id="level-badge">Level 1</span>
                    <span id="quest-text">🎯 Fahre zum Ziel!</span>
                </div>
                <div class="hud-btns">
                    <button class="hud-action-btn" id="cam-toggle-btn">🎥 Ansicht: Follow</button>
                    <button class="hud-action-btn" id="reset-btn">🔄 Reset</button>
                </div>
            </div>
            
            <!-- Sensor Overlay -->
            <div class="sensor-overlay glass-panel">
                <div class="overlay-header">
                    <span>▼</span> Sensor Ausgabe:
                </div>
                <div class="overlay-body" id="sensor-output">
                    Eco-Bot bereit. Nutze WASD zum Steuern oder klicke links [⚏] zum Programmieren!
                </div>
            </div>

            <!-- D-Pad (Touch + Click) -->
            <div class="dpad" id="dpad">
                <button class="dpad-btn dpad-up" data-dir="up" id="dpad-up">▲</button>
                <button class="dpad-btn dpad-left" data-dir="left" id="dpad-left">◀</button>
                <button class="dpad-btn dpad-center" id="dpad-center">🤖</button>
                <button class="dpad-btn dpad-right" data-dir="right" id="dpad-right">▶</button>
                <button class="dpad-btn dpad-down" data-dir="down" id="dpad-down">▼</button>
            </div>

            <!-- Bottom Control Bar -->
            <div class="bottom-bar">
                <button id="btn-run" class="action-btn">▶</button>
                <button id="btn-stop" class="action-btn stop">■</button>
            </div>

            <!-- Success Overlay -->
            <div class="success-overlay" id="success-overlay" style="display:none;">
                <div class="success-content glass-panel">
                    <div class="success-emoji">🎉</div>
                    <h2>Ziel erreicht!</h2>
                    <p id="success-points">+100 Punkte</p>
                    <button class="success-btn" id="btn-next-quest">Weiter →</button>
                </div>
            </div>

            <!-- Reward Popup -->
            <div class="reward-popup glass-panel" id="reward-popup">
                <div class="reward-icon" id="reward-icon">🚀</div>
                <div class="reward-title" id="reward-title">Upgrade freigeschaltet!</div>
                <div class="reward-desc" id="reward-desc">Dein Roboter ist jetzt schneller.</div>
                <button class="success-btn" id="btn-reward-close">Cool!</button>
            </div>
        </main>
    </div>

    <!-- IDE overlay with Blockly -->
    <div id="code-ide" class="glass-panel hidden">
        <div id="blocklyDiv" style="height: 100%; width: 100%;"></div>
    </div>

    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            const out = document.getElementById('sensor-output');
            if (out) out.innerText = "CRITICAL JS ERROR: " + msg + " at line " + lineNo;
            console.error("CRITICAL JS ERROR: ", msg, error);
            return false;
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="js/blockly_setup.js?v=11"></script>
    <script src="js/app3d_v4.js?v=11"></script>
</body>
</html>
